<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>刷券代拍记账本</title>
<style>
  :root {
    --primary: #5b9bd5;
    --primary-light: #e8f1fa;
    --accent: #6cc4a1;
    --accent-light: #e6f7f0;
    --bg: #f7f9fc;
    --card: #ffffff;
    --text: #2c3e50;
    --text-secondary: #7f8c9b;
    --border: #e4e8ee;
    --danger: #e74c3c;
    --profit-positive: #27ae60;
    --profit-negative: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
  }
  h1 span { color: var(--primary); }

  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--card);
    border-radius: 10px;
    padding: 16px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .summary-card .label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .summary-card .value {
    font-size: 22px;
    font-weight: 700;
  }
  .summary-card.profit .value { color: var(--profit-positive); }
  .summary-card.cps .value { color: var(--primary); }
  .summary-card.orders .value { color: var(--accent); }
  .val-neutral { color: var(--text) !important; }
  .val-gain { color: var(--profit-positive) !important; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
    padding: 12px 16px;
    background: var(--card);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .filter-bar label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .filter-bar select, .filter-bar input[type="date"], .filter-bar input[type="text"] {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .filter-bar select:focus, .filter-bar input[type="date"]:focus, .filter-bar input[type="text"]:focus {
    border-color: var(--primary);
  }
  .filter-reset {
    font-size: 12px;
    color: var(--primary);
    cursor: pointer;
    text-decoration: underline;
    margin-left: auto;
  }

  .table-card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: visible;
  }
  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .table-header h2 {
    font-size: 15px;
    font-weight: 600;
  }
  .update-info {
    font-size: 11px;
    color: var(--text-secondary);
  }
  .table-wrapper { overflow-x: auto; }
  table {
    min-width: 1200px;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    z-index: 3;
    background: var(--bg);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 12px;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }

  /* Sticky columns: time (1st) and product name (2nd) */
  thead th:nth-child(1), thead th:nth-child(2),
  tbody td:nth-child(1), tbody td:nth-child(2) {
    position: sticky;
    z-index: 1;
  }
  thead th:nth-child(1), tbody td:nth-child(1) {
    left: 0;
    width: 170px;
    min-width: 170px;
    background: var(--card);
    box-shadow: 2px 0 4px rgba(0,0,0,0.06);
  }
  thead th:nth-child(2), tbody td:nth-child(2) {
    left: 170px;
    min-width: 160px;
    max-width: 200px;
    white-space: normal;
    word-break: break-all;
    background: var(--card);
    box-shadow: 2px 0 4px rgba(0,0,0,0.06);
  }
  thead th:nth-child(1), thead th:nth-child(2) {
    background: var(--bg);
    z-index: 4;
  }
  tbody tr:last-child td { border-bottom: none; }
  .profit-cell { font-weight: 700; }
  .profit-positive { color: var(--profit-positive); }
  .profit-negative { color: var(--profit-negative); }
  .platform-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .platform-137 { background: #fff3e0; color: #e65100; }
  .platform-197 { background: #e0f2f1; color: #00695c; }
  .platform-198 { background: #e3f2fd; color: #1565c0; }
  .platform-taobao { background: #fff8e1; color: #f57f17; }
  .platform-jd { background: #ede7f6; color: #4527a0; }
  .platform-pdd { background: #fce4ec; color: #c62828; }
  .platform-other { background: #f3e5f5; color: #6a1b9a; }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
    font-size: 14px;
  }

  @media (max-width: 700px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .summary-card .value { font-size: 18px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1><span>刷券代拍</span> 记账本</h1>

  <div class="summary">
    <div class="summary-card">
      <div class="label">总买入成本</div>
      <div class="value val-neutral" id="totalCost">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">总卖价收入</div>
      <div class="value val-neutral" id="totalRevenue">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">总手续费</div>
      <div class="value val-neutral" id="totalFee">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">总返现</div>
      <div class="value val-gain" id="totalCps">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">总利润（不含返现）</div>
      <div class="value val-gain" id="profitNoCps">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">总利润（含返现）</div>
      <div class="value val-gain" id="totalProfit">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">回款金额</div>
      <div class="value val-gain" id="totalPaid">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">买卖差价</div>
      <div class="value val-gain" id="totalSpread">¥0</div>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" id="filterName" placeholder="搜索商品" oninput="render()">
    <input type="text" id="filterBuyer" placeholder="搜索购买者" oninput="render()">
    <input type="text" id="filterOrderNo" placeholder="订单号" oninput="render()">
    <label>发货</label>
    <select id="filterShipped" onchange="render()">
      <option value="">全部</option>
      <option value="yes">已发货</option>
      <option value="no">未发货</option>
    </select>
    <label>平台</label>
    <select id="filterPlatform" onchange="render()">
      <option value="">全部</option>
    </select>
    <label>日期从</label>
    <input type="date" id="filterDateFrom" onchange="render()">
    <label>到</label>
    <input type="date" id="filterDateTo" onchange="render()">
    <span class="filter-reset" onclick="resetFilter()">重置筛选</span>
  </div>

  <div class="table-card">
    <div class="table-header">
      <h2>交易记录 <span id="recordCount" style="font-size:13px;font-weight:400;color:var(--text-secondary)"></span></h2>
      <span class="update-info" id="updateTime"></span>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>时间</th>
            <th>商品</th>
            <th>已发货</th>
            <th>回款</th>
            <th>闲鱼购买者</th>
            <th>平台</th>
            <th>买入价</th>
            <th>卖出价</th>
            <th>手续费</th>
            <th>CPS返现</th>
            <th>净利润</th>
            <th>购买订单号</th>
            <th>闲鱼订单号</th>
            <th>备注</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState">还没有记录</div>
    </div>
  </div>
</div>

const UPDATED_AT = "2026-06-12 22:16";
// ========== DATA_END ==========

function getPlatformClass(p) {
  if (p.includes('137')) return 'platform-137';
  if (p.includes('197')) return 'platform-197';
  if (p.includes('198')) return 'platform-198';
  if (p.includes('淘宝')) return 'platform-taobao';
  if (p.includes('京东')) return 'platform-jd';
  if (p.includes('拼多多')) return 'platform-pdd';
  return 'platform-other';
}

function getFiltered() {
  const nameKw = document.getElementById('filterName').value.trim().toLowerCase();
  const buyerKw = document.getElementById('filterBuyer').value.trim().toLowerCase();
  const orderNo = document.getElementById('filterOrderNo').value.trim();
  const shipped = document.getElementById('filterShipped').value;
  const pf = document.getElementById('filterPlatform').value;
  const df = document.getElementById('filterDateFrom').value;
  const dt = document.getElementById('filterDateTo').value;
  return RECORDS.filter(r => {
    if (nameKw && !r.name.toLowerCase().includes(nameKw)) return false;
    if (buyerKw && !(r.buyer || '').toLowerCase().includes(buyerKw)) return false;
    if (orderNo && r.buyOrderNo !== orderNo && r.sellOrderNo !== orderNo) return false;
    if (shipped === 'yes' && r.shipped !== true) return false;
    if (shipped === 'no' && r.shipped !== false) return false;
    if (pf && r.platform !== pf) return false;
    if (df && r.date.substring(0,10) < df) return false;
    if (dt && r.date.substring(0,10) > dt) return false;
    return true;
  });
}

function resetFilter() {
  document.getElementById('filterName').value = '';
  document.getElementById('filterBuyer').value = '';
  document.getElementById('filterOrderNo').value = '';
  document.getElementById('filterShipped').value = '';
  document.getElementById('filterPlatform').value = '';
  document.getElementById('filterDateFrom').value = '';
  document.getElementById('filterDateTo').value = '';
  render();
}

// Populate platform filter options
(function() {
  const platforms = [...new Set(RECORDS.map(r => r.platform))].sort();
  const sel = document.getElementById('filterPlatform');
  platforms.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    sel.appendChild(opt);
  });
})();

function render() {
  const filtered = getFiltered();
  const totalCost = filtered.reduce((s, r) => s + r.buyPrice, 0);
  const totalRevenue = filtered.reduce((s, r) => s + r.sellPrice, 0);
  const totalFee = filtered.reduce((s, r) => s + (r.fee || 0), 0);
  const totalCps = filtered.reduce((s, r) => s + (r.cps || 0), 0);
  const totalProfit = filtered.reduce((s, r) => s + (r.sellPrice - r.buyPrice + (r.cps || 0) - (r.fee || 0)), 0);
  const profitNoCps = totalProfit - totalCps;
  const totalSpread = totalRevenue - totalCost;
  const totalPaid = filtered.filter(r => r.paid === true).reduce((s, r) => s + r.buyPrice, 0);

  document.getElementById('totalCost').textContent = '¥' + totalCost.toFixed(2);
  document.getElementById('totalRevenue').textContent = '¥' + totalRevenue.toFixed(2);
  document.getElementById('totalFee').textContent = '¥' + totalFee.toFixed(2);
  document.getElementById('totalCps').textContent = '¥' + totalCps.toFixed(2);

  const profitEl = document.getElementById('totalProfit');
  profitEl.textContent = (totalProfit >= 0 ? '¥' : '-¥') + Math.abs(totalProfit).toFixed(2);
  profitEl.style.color = totalProfit < 0 ? 'var(--profit-negative)' : '';

  const pncEl = document.getElementById('profitNoCps');
  pncEl.textContent = (profitNoCps >= 0 ? '¥' : '-¥') + Math.abs(profitNoCps).toFixed(2);
  pncEl.style.color = profitNoCps < 0 ? 'var(--profit-negative)' : '';

  const spreadEl = document.getElementById('totalSpread');
  spreadEl.textContent = (totalSpread >= 0 ? '¥' : '-¥') + Math.abs(totalSpread).toFixed(2);
  spreadEl.style.color = totalSpread < 0 ? 'var(--profit-negative)' : '';

  document.getElementById('totalPaid').textContent = '¥' + totalPaid.toFixed(2);

  if (UPDATED_AT) {
    document.getElementById('updateTime').textContent = '更新于 ' + UPDATED_AT;
  }

  document.getElementById('recordCount').textContent = '共 ' + filtered.length + ' 笔';

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(r => {
    const profit = r.sellPrice - r.buyPrice + (r.cps || 0) - (r.fee || 0);
    const profitClass = profit >= 0 ? 'profit-positive' : 'profit-negative';
    const profitSign = profit >= 0 ? '+' : '';
    return `<tr>
      <td>${r.date}</td>
      <td>${r.name}</td>
      <td style="font-size:12px">${r.shipped === true ? '<span style="color:var(--profit-positive)">是</span>' : r.shipped === false ? '<span style="color:var(--profit-negative)">否</span>' : '-'}</td>
      <td style="font-size:12px">${r.paid === true ? '<span style="color:var(--profit-positive)">是</span>' : r.paid === false ? '<span style="color:var(--profit-negative)">否</span>' : '-'}</td>
      <td style="font-size:11px;color:var(--text-secondary)">${r.buyer || '-'}</td>
      <td><span class="platform-tag ${getPlatformClass(r.platform)}">${r.platform}</span></td>
      <td>¥${r.buyPrice.toFixed(2)}</td>
      <td>¥${r.sellPrice.toFixed(2)}</td>
      <td>¥${(r.fee || 0).toFixed(2)}</td>
      <td>¥${(r.cps || 0).toFixed(2)}</td>
      <td class="profit-cell ${profitClass}">${profitSign}¥${Math.abs(profit).toFixed(2)}</td>
      <td style="font-size:11px;color:var(--text-secondary)">${r.buyOrderNo || '-'}</td>
      <td style="font-size:11px;color:var(--text-secondary)">${r.sellOrderNo || '-'}</td>
      <td style="font-size:11px;color:var(--text-secondary)">${r.note || '-'}</td>
    </tr>`;
  }).join('');
}

render();
