<style>
  :root {
    --primary: #5b9bd5;
    --primary-light: #e8f1fa;
    --accent: #6cc4a1;
    --accent-light: #e6f7f0;
    --bg: #f7f9fc;
    --card: #ffffff;
    --text: #2c3e50;
    --text-secondary: #7f8c9b;
    --border: #e4e8ee;
    --danger: #e74c3c;
    --profit-positive: #e74c3c;
    --profit-negative: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.6;
    min-height: 100vh;
  }
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 24px 16px;
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 24px;
  }
  h1 span { color: var(--primary); }

  .summary {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--card);
    border-radius: 10px;
    padding: 10px 16px;
    text-align: center;
    border: 1px solid var(--border);
  }
  .summary-card .label {
    font-size: 12px;
    color: var(--text-secondary);
    margin-bottom: 4px;
  }
  .summary-card .value {
    font-size: 22px;
    font-weight: 700;
  }
  .summary-card.profit .value { color: var(--profit-positive); }
  .summary-card.cps .value { color: var(--primary); }
  .summary-card.orders .value { color: var(--accent); }
  .val-neutral { color: var(--text) !important; }
  .val-gain { color: var(--profit-positive) !important; }

  /* Filter bar */
  .filter-bar {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
    padding: 12px 16px;
    background: var(--card);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .filter-bar label {
    font-size: 12px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .filter-bar select, .filter-bar input[type="date"], .filter-bar input[type="text"] {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
    outline: none;
  }
  .filter-bar select:focus, .filter-bar input[type="date"]:focus, .filter-bar input[type="text"]:focus {
    border-color: var(--primary);
  }
  .filter-reset {
    font-size: 12px;
    color: var(--primary);
    cursor: pointer;
    text-decoration: underline;
    margin-left: auto;
  }

  .table-card {
    background: var(--card);
    border-radius: 12px;
    border: 1px solid var(--border);
    overflow: visible;
  }
  .table-header {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .table-header h2 {
    font-size: 15px;
    font-weight: 600;
  }
  .update-info {
    font-size: 11px;
    color: var(--text-secondary);
  }
  .table-wrapper { overflow-x: auto; }
  .table-wrapper > table {
    min-width: 1200px;
    border-collapse: separate;
    border-spacing: 0;
    font-size: 13px;
  }
  thead th {
    position: sticky;
    top: 0;
    z-index: 3;
    background: var(--bg);
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 12px;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
  }
  tbody td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tbody tr:last-child td { border-bottom: none; }

  /* Sticky first column: product name */
  thead th:nth-child(1),
  tbody td:nth-child(1) {
    position: sticky;
    left: 0;
    z-index: 1;
    min-width: 160px;
    max-width: 220px;
    white-space: normal;
    word-break: break-all;
    background: var(--card);
    box-shadow: 2px 0 4px rgba(0,0,0,0.06);
  }
  thead th:nth-child(1) {
    background: var(--bg);
    z-index: 4;
  }
  tbody tr:last-child td { border-bottom: none; }
  .profit-cell { font-weight: 700; }
  .profit-positive { color: var(--profit-positive); }
  .profit-negative { color: var(--profit-negative); }
  .platform-tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }
  .platform-137 { background: #fff3e0; color: #e65100; }
  .platform-197 { background: #e0f2f1; color: #00695c; }
  .platform-198 { background: #e3f2fd; color: #1565c0; }
  .platform-taobao { background: #fff8e1; color: #f57f17; }
  .platform-jd { background: #ede7f6; color: #4527a0; }
  .platform-pdd { background: #fce4ec; color: #c62828; }
  .platform-other { background: #f3e5f5; color: #6a1b9a; }
  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary);
    font-size: 14px;
  }

  .tab-nav {
    display: flex;
    gap: 4px;
    margin-bottom: 20px;
    background: var(--card);
    border-radius: 10px;
    padding: 4px;
    border: 1px solid var(--border);
  }
  .tab-nav button {
    flex: 1;
    padding: 10px 16px;
    border: none;
    background: transparent;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
  }
  .tab-nav button.active {
    background: var(--primary);
    color: #fff;
  }
  .tab-panel {
    display: none;
  }
  .tab-panel.active {
    display: block;
  }
  .marketing-table {
    width: 100%;
    table-layout: fixed;
    border-collapse: separate;
    border-spacing: 0;
  }
  .marketing-table th, .marketing-table td {
    padding: 10px 12px;
    text-align: left;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    width: 33.3333%;
    word-break: break-word;
  }
  .marketing-table th {
    background: var(--bg);
    font-weight: 600;
    color: var(--text-secondary);
    font-size: 12px;
  }

  @media (max-width: 700px) {
    .summary { grid-template-columns: repeat(2, 1fr); }
    .summary-card .value { font-size: 18px; }
  }

  .analytics-controls {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
    padding: 16px;
    background: var(--card);
    border-radius: 10px;
    border: 1px solid var(--border);
  }
  .analytics-controls label {
    font-size: 13px;
    color: var(--text-secondary);
    font-weight: 500;
  }
  .analytics-controls input[type="date"] {
    padding: 6px 10px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 13px;
    color: var(--text);
    background: var(--bg);
  }
  .metric-toggles {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    width: 100%;
    margin-top: 4px;
  }
  .metric-toggle {
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--card);
    font-size: 12px;
    font-weight: 500;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
  }
  .metric-toggle.active {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary);
  }
  .chart-container {
    background: var(--card);
    border-radius: 10px;
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
    height: 400px;
  }
  .period-btns {
    display: flex;
    gap: 6px;
  }
  .period-btn {
    padding: 5px 12px;
    border-radius: 6px;
    border: 1px solid var(--border);
    background: var(--card);
    font-size: 12px;
    color: var(--text-secondary);
    cursor: pointer;
    transition: all 0.2s;
  }
  .period-btn.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }
  @media (max-width: 700px) {
    .chart-container { height: 300px; padding: 12px; }
    .analytics-controls { padding: 12px; gap: 8px; }
  }
</style>
</head>

  <div class="tab-nav">
    <button class="active" onclick="switchTab('ledger')">记账本</button>
    <button onclick="switchTab('marketing')">营销账单</button>
    <button onclick="switchTab('analytics')">数据分析</button>
  </div>

  <div id="tab-ledger" class="tab-panel active">

      <div class="value" id="totalRevenue">¥0</div>
    </div>
    <div class="summary-card">

      <div class="label">返现金额</div>
      <div class="value" id="totalCps">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">总利润</div>
      <div class="value" id="totalProfit">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">回款金额</div>
      <div class="value" id="totalPaid">¥0</div>
    </div>
    <div class="summary-card">
      <div class="label">冻结金额</div>
      <div class="value" id="frozenAmount">¥0</div>
    </div>
  </div>

  <div class="filter-bar">
    <input type="text" id="filterName" placeholder="搜索商品" oninput="render()">
    <input type="text" id="filterBuyer" placeholder="搜索购买者" oninput="render()">
    <input type="text" id="filterOrderNo" placeholder="订单号" oninput="render()">

    <select id="filterShipped" onchange="render()">

      <option value="yes">已发货</option>
      <option value="no">未发货</option>
    </select>
    <label>回款</label>
    <select id="filterPaid" onchange="render()">
      <option value="">全部</option>
      <option value="yes">已回款</option>
      <option value="no">未回款</option>
    </select>
    <div style="width:100%"></div>
    <label>平台</label>
    <select id="filterPlatform" onchange="render()">
      <option value="">全部</option>
    </select>
    <label>日期从</label>
    <input type="date" id="filterDateFrom" onchange="render()">
    <label>到</label>
    <input type="date" id="filterDateTo" onchange="render()">
    <span class="filter-reset" onclick="resetFilter()">重置筛选</span>
  </div>

  <div class="table-card">
    <div class="table-header">
      <h2>交易记录 <span id="recordCount" style="font-size:13px;font-weight:400;color:var(--text-secondary)"></span></h2>
      <span class="update-info" id="updateTime"></span>
    </div>
    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>商品</th>
            <th>已发货</th>
            <th>回款</th>
            <th>闲鱼购买者</th>
            <th>平台</th>
            <th>时间</th>
            <th>买入价</th>
            <th>卖出价</th>
            <th>手续费</th>
            <th>CPS返现</th>
            <th>净利润</th>
            <th>购买订单号</th>
            <th>闲鱼订单号</th>
            <th>备注</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div class="empty-state" id="emptyState">还没有记录</div>
    </div>
  </div>
  </div>

  <div id="tab-marketing" class="tab-panel">
    <div class="table-card">
      <div class="table-header">
        <h2>营销账单</h2>
      </div>
      <div style="padding: 0 16px 16px;">
        <table class="marketing-table">
          <thead>
            <tr>
              <th>时间</th>
              <th>内容</th>
              <th>投放成本</th>
            </tr>
          </thead>
          <tbody id="marketingBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <div id="tab-analytics" class="tab-panel">
    <div class="analytics-controls">
      <label>周期</label>
      <div class="period-btns">
        <button class="period-btn active" data-days="7" onclick="setPeriod(7)">近7天</button>
        <button class="period-btn" data-days="14" onclick="setPeriod(14)">近14天</button>
        <button class="period-btn" data-days="30" onclick="setPeriod(30)">近30天</button>
        <button class="period-btn" data-days="0" onclick="setPeriod(0)">全部</button>
      </div>
      <label>从</label>
      <input type="date" id="analyticsDateFrom" onchange="renderChart()">
      <label>到</label>
      <input type="date" id="analyticsDateTo" onchange="renderChart()">
      <div class="metric-toggles">
        <span class="metric-toggle" data-metric="count" onclick="toggleMetric(this)">下单次数</span>
        <span class="metric-toggle" data-metric="cost" onclick="toggleMetric(this)">下单成本</span>
        <span class="metric-toggle" data-metric="revenue" onclick="toggleMetric(this)">下单出价</span>
        <span class="metric-toggle" data-metric="spread" onclick="toggleMetric(this)">差价</span>
        <span class="metric-toggle" data-metric="cps" onclick="toggleMetric(this)">返现</span>
        <span class="metric-toggle active" data-metric="profit" onclick="toggleMetric(this)">总利润</span>
      </div>
    </div>
    <div class="chart-container">
      <canvas id="trendChart"></canvas>
    </div>
  </div>
</div>

function getFiltered() {
  const nameKw = document.getElementById('filterName').value.trim().toLowerCase();
  const buyerKw = document.getElementById('filterBuyer').value.trim().toLowerCase();
  const orderNo = document.getElementById('filterOrderNo').value.trim();
  const shipped = document.getElementById('filterShipped').value;
  const paid = document.getElementById('filterPaid').value;
  const pf = document.getElementById('filterPlatform').value;
  const df = document.getElementById('filterDateFrom').value;
  const dt = document.getElementById('filterDateTo').value;
  return RECORDS.filter(r => {
    if (nameKw && !r.name.toLowerCase().includes(nameKw)) return false;
    if (buyerKw && !(r.buyer || '').toLowerCase().includes(buyerKw)) return false;
    if (orderNo && r.buyOrderNo !== orderNo && r.sellOrderNo !== orderNo) return false;
    if (shipped === 'yes' && r.shipped !== true) return false;
    if (shipped === 'no' && r.shipped !== false) return false;
    if (paid === 'yes' && r.paid !== true) return false;
    if (paid === 'no' && r.paid !== false) return false;
    if (pf && r.platform !== pf) return false;
    if (df && r.date.substring(0,10) < df) return false;
    if (dt && r.date.substring(0,10) > dt) return false;
    return true;
  });
}

// Populate platform filter options
(function() {
  const platforms = [...new Set(RECORDS.map(r => r.platform))].sort();
  const sel = document.getElementById('filterPlatform');
  platforms.forEach(p => {
    const opt = document.createElement('option');
    opt.value = p;
    opt.textContent = p;
    sel.appendChild(opt);
  });
  // Ensure render fires even when re-selecting the same option
  sel.addEventListener('click', function() { setTimeout(render, 100); });
  document.getElementById('filterShipped').addEventListener('click', function() { setTimeout(render, 100); });
  document.getElementById('filterPaid').addEventListener('click', function() { setTimeout(render, 100); });
})();

function render() {
  const filtered = getFiltered();
  filtered.sort((a, b) => b.date.localeCompare(a.date));
  const active = filtered.filter(r => r.sellPrice > 0 && !r.refunded);
  const totalCost = active.reduce((s, r) => s + r.buyPrice, 0);
  const totalRevenue = active.reduce((s, r) => s + r.sellPrice, 0);
  const totalFee = active.reduce((s, r) => s + (r.fee || 0), 0);
  const totalCps = active.reduce((s, r) => s + (r.cps || 0), 0);
  const totalProfit = active.reduce((s, r) => s + (r.sellPrice - r.buyPrice + (r.cps || 0) - (r.fee || 0)), 0);
  const totalSpread = totalRevenue - totalCost;
  const totalPaid = active.filter(r => r.paid === true || r.note === '已回款').reduce((s, r) => s + r.buyPrice, 0);
  const frozenAmount = totalCost - totalPaid;

  document.getElementById('totalCost').textContent = '¥' + totalCost.toFixed(2);
  document.getElementById('totalRevenue').textContent = '¥' + totalRevenue.toFixed(2);

  document.getElementById('totalSpread').textContent = (totalSpread >= 0 ? '¥' : '-¥') + Math.abs(totalSpread).toFixed(2);
  document.getElementById('totalFee').textContent = '¥' + totalFee.toFixed(2);
  document.getElementById('totalCps').textContent = '¥' + totalCps.toFixed(2);
  document.getElementById('totalProfit').textContent = (totalProfit >= 0 ? '¥' : '-¥') + Math.abs(totalProfit).toFixed(2);

  document.getElementById('totalPaid').textContent = '¥' + totalPaid.toFixed(2);
  document.getElementById('frozenAmount').textContent = '¥' + frozenAmount.toFixed(2);

  if (UPDATED_AT) {
    document.getElementById('updateTime').textContent = '更新于 ' + UPDATED_AT;
  }

  document.getElementById('recordCount').textContent = '共 ' + filtered.length + ' 笔';

  const tbody = document.getElementById('tableBody');
  const empty = document.getElementById('emptyState');
  if (filtered.length === 0) {
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  tbody.innerHTML = filtered.map(r => {
    const isUnsold = r.sellPrice === 0;
    const isRefunded = r.refunded === true;
    const strikeStyle = (isUnsold || isRefunded) ? 'style="text-decoration:line-through;opacity:0.6;"' : '';
    const profit = r.sellPrice - r.buyPrice + (r.cps || 0) - (r.fee || 0);
    const profitClass = profit >= 0 ? 'profit-positive' : 'profit-negative';
    const profitSign = profit >= 0 ? '+' : '';
    return `<tr ${strikeStyle}>
      <td>${r.name}</td>
      <td style="font-size:12px">${r.shipped === true ? '<span style="color:var(--profit-positive)">是</span>' : '-'}</td>
      <td style="font-size:12px">${r.paid === true || r.note === '已回款' ? '<span style="color:var(--profit-positive)">是</span>' : '-'}</td>
      <td style="font-size:11px;color:var(--text-secondary)">${r.buyer || '-'}</td>
      <td><span class="platform-tag ${getPlatformClass(r.platform)}">${r.platform}</span></td>
      <td>${r.date}</td>
      <td>¥${r.buyPrice.toFixed(2)}</td>
      <td>¥${r.sellPrice.toFixed(2)}</td>
      <td>¥${(r.fee || 0).toFixed(2)}</td>
      <td>¥${(r.cps || 0).toFixed(2)}</td>
      <td class="profit-cell ${profitClass}">${profitSign}¥${Math.abs(profit).toFixed(2)}</td>
      <td style="font-size:11px;color:var(--text-secondary)">${r.buyOrderNo || '-'}</td>
      <td style="font-size:11px;color:var(--text-secondary)">${r.sellOrderNo || '-'}</td>
      <td style="font-size:11px;color:var(--text-secondary)">${r.note || '-'}</td>
    </tr>`;
  }).join('');
}

render();

function switchTab(tab) {
  document.querySelectorAll('.tab-panel').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-nav button').forEach(el => el.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  event.target.classList.add('active');
  if (tab === 'analytics') renderChart();
}

const MARKETING_RECORDS = [
  {"date": "2026-06-17", "content": "咸鱼11.9擦亮", "cost": 11.0},
  {"date": "2026-06-16", "content": "咸鱼5.9擦亮", "cost": 5.9},
  {"date": "2026-06-16", "content": "咸鱼8.9擦亮", "cost": 8.0}
];

function renderMarketing() {
  const tbody = document.getElementById('marketingBody');
  const totalCost = MARKETING_RECORDS.reduce((s, r) => s + r.cost, 0);
  if (MARKETING_RECORDS.length === 0) {
    tbody.innerHTML = '<tr><td colspan="3" style="text-align:center;color:var(--text-secondary);padding:40px 20px;">暂无记录</td></tr>';
    return;
  }
  tbody.innerHTML = MARKETING_RECORDS.map(r => `
    <tr>
      <td>${r.date}</td>
      <td>${r.content}</td>
      <td>¥${r.cost.toFixed(2)}</td>
    </tr>

    <tr style="font-weight:600;background:var(--bg);">
      <td colspan="2">合计</td>
      <td>¥${totalCost.toFixed(2)}</td>
    </tr>
  `;
}

renderMarketing();

// ========== Analytics Chart ==========
let trendChart = null;

const METRIC_CONFIG = {
  count:   { label: '下单次数', color: '#5b9bd5', yAxisID: 'y1', unit: '笔' },
  cost:    { label: '下单成本', color: '#e74c3c', yAxisID: 'y',  unit: '¥' },
  revenue: { label: '下单出价', color: '#f39c12', yAxisID: 'y',  unit: '¥' },
  spread:  { label: '差价',     color: '#2ecc71', yAxisID: 'y',  unit: '¥' },
  cps:     { label: '返现',     color: '#9b59b6', yAxisID: 'y',  unit: '¥' },
  profit:  { label: '总利润',   color: '#1abc9c', yAxisID: 'y',  unit: '¥' }
};

function aggregateByDay(records) {
  const active = records.filter(r => r.sellPrice > 0 && !r.refunded);
  const map = {};
  active.forEach(r => {
    const day = r.date.substring(0, 10);
    if (!map[day]) map[day] = { count: 0, cost: 0, revenue: 0, cps: 0, profit: 0 };
    map[day].count++;
    map[day].cost += r.buyPrice;
    map[day].revenue += r.sellPrice;
    map[day].cps += (r.cps || 0);
    map[day].profit += (r.sellPrice - r.buyPrice + (r.cps || 0) - (r.fee || 0));
  });
  const days = Object.keys(map).sort();
  days.forEach(d => { map[d].spread = map[d].revenue - map[d].cost; });
  return { days, map };
}

function getActiveMetrics() {
  return Array.from(document.querySelectorAll('.metric-toggle.active')).map(el => el.dataset.metric);
}

function setPeriod(days) {
  document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  const df = document.getElementById('analyticsDateFrom');
  const dt = document.getElementById('analyticsDateTo');
  if (days === 0) {
    df.value = '';
    dt.value = '';
  } else {
    const now = new Date();
    const from = new Date(now);
    from.setDate(from.getDate() - days + 1);
    df.value = from.toISOString().substring(0, 10);
    dt.value = now.toISOString().substring(0, 10);
  }
  renderChart();
}

function toggleMetric(el) {
  el.classList.toggle('active');
  renderChart();
}

function renderChart() {
  if (!document.getElementById('tab-analytics').classList.contains('active')) return;
  const df = document.getElementById('analyticsDateFrom').value;
  const dt = document.getElementById('analyticsDateTo').value;
  let filtered = RECORDS;
  if (df) filtered = filtered.filter(r => r.date.substring(0,10) >= df);
  if (dt) filtered = filtered.filter(r => r.date.substring(0,10) <= dt);

  const { days, map } = aggregateByDay(filtered);
  const metrics = getActiveMetrics();

  const datasets = metrics.map(key => {
    const cfg = METRIC_CONFIG[key];
    return {
      label: cfg.label,
      data: days.map(d => {
        const v = map[d] ? map[d][key] : 0;
        return key === 'count' ? v : Math.round(v * 100) / 100;
      }),
      borderColor: cfg.color,
      backgroundColor: cfg.color + '20',
      borderWidth: 2,
      pointRadius: 4,
      pointBackgroundColor: cfg.color,
      pointHoverRadius: 6,
      tension: 0.3,
      fill: false,
      yAxisID: cfg.yAxisID
    };
  });

  const labels = days.map(d => d.substring(5));
  const hasCount = metrics.includes('count');
  const hasMoney = metrics.some(m => m !== 'count');

  const config = {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'top', labels: { usePointStyle: true, padding: 16, font: { size: 12 } } },
        tooltip: {
          backgroundColor: 'rgba(44,62,80,0.92)',
          titleFont: { size: 13 },
          bodyFont: { size: 12 },
          padding: 10,
          cornerRadius: 8,
          callbacks: {
            label: function(ctx) {
              const m = metrics[ctx.datasetIndex];
              const cfg = METRIC_CONFIG[m];
              const v = ctx.parsed.y;
              return cfg.label + ': ' + (cfg.unit === '¥' ? '¥' + v.toFixed(2) : v + '笔');
            }
          }
        }
      },
      scales: {
        x: {
          grid: { display: false },
          ticks: { font: { size: 11 }, color: '#7f8c9b' }
        },
        y: {
          type: 'linear',
          display: hasMoney,
          position: 'left',
          grid: { color: '#f0f0f0' },
          ticks: { font: { size: 11 }, color: '#7f8c9b', callback: v => '¥' + v }
        },
        y1: {
          type: 'linear',
          display: hasCount,
          position: 'right',
          grid: { drawOnChartArea: false },
          ticks: { font: { size: 11 }, color: '#7f8c9b', stepSize: 1 }
        }
      }
    }
  };

  if (trendChart) {
    trendChart.destroy();
  }
  trendChart = new Chart(document.getElementById('trendChart'), config);
}

// Init analytics with default 14-day period
(function initAnalytics() {
  const now = new Date();
  const from = new Date(now);
  from.setDate(from.getDate() - 6);
  document.getElementById('analyticsDateFrom').value = from.toISOString().substring(0, 10);
  document.getElementById('analyticsDateTo').value = now.toISOString().substring(0, 10);
})();
</script>
